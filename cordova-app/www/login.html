<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Farmers Friend</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="mobile-config.js"></script>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <img src="image/logo.jpeg" alt="Farmers Friend Logo" class="header-logo">
                <h2>Farmers Friend</h2>
                <p id="authSubtitle">Login to continue</p>
            </div>

            <!-- Tab Switcher -->
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
                <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form">
                <label for="loginId">User ID</label>
                <input type="text" id="loginId" class="market-input" placeholder="Enter your ID">

                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" class="market-input" placeholder="Enter your password">

                <button type="submit" class="verify-btn login-btn">Login</button>
            </form>

            <!-- Registration Form -->
            <form id="registerForm" class="login-form" style="display:none;">
                <label for="regRole">Role</label>
                <select id="regRole" class="market-input">
                    <option value="">Select role</option>
                    <option value="seller">Product Seller</option>
                    <option value="user">User</option>
                </select>

                <label for="regName">Full Name</label>
                <input type="text" id="regName" class="market-input" placeholder="Enter your full name">

                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" class="market-input" placeholder="Enter your email">

                <label for="regId">User ID</label>
                <input type="text" id="regId" class="market-input" placeholder="Choose a unique user ID">

                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" class="market-input" placeholder="Create a password">

                <label for="regConfirmPassword">Confirm Password</label>
                <input type="password" id="regConfirmPassword" class="market-input" placeholder="Confirm your password">

                <button type="submit" class="verify-btn login-btn">Register</button>
            </form>

            <!-- Download Registered Users (Admin only, shown after login) -->
            <button id="downloadUsersBtn" class="verify-btn login-btn" style="display:none; margin-top:10px; background:var(--lab-blue);" onclick="downloadUsersAsExcel()">
                <i class="fa-solid fa-file-excel"></i> Download Users (Excel)
            </button>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="script.js"></script>
</body>
</html>
