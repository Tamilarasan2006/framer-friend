<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Farmers Friend</title>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>
            <img src="image/logo.jpeg" alt="Farmers Friend Logo" class="header-logo">
            <span>PRODUCT DETAILS</span>
            <i class="fa-solid fa-tractor tractor-icon"></i>
        </h1>
        <div class="spacer"></div>
    </header>

    <!-- Floating Cart Button (bottom-right) -->
    <div id="cartFab" class="cart-fab" onclick="toggleCartPanel()">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="cartBadge" class="cart-badge" style="display:none;">0</span>
    </div>

    <!-- Cart Slide-Out Panel -->
    <div id="cartPanel" class="cart-panel">
        <div class="cart-panel-header">
            <h3><i class="fa-solid fa-cart-shopping"></i> My Cart</h3>
            <button class="cart-close-btn" onclick="closeCartPanel()"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div id="cartItemsSection">
            <div id="cartEmpty" class="cart-empty">
                <i class="fa-solid fa-basket-shopping" style="font-size:40px; color:#ccc;"></i>
                <p>Your cart is empty</p>
            </div>
            <div id="cartItemsList" class="cart-items-list"></div>
            <div id="cartFooter" class="cart-footer" style="display:none;">
                <div class="cart-total-row">
                    <span>Total</span>
                    <span class="cart-total-amount">₹<span id="cartTotalPrice">0</span></span>
                </div>
                <button class="cart-pay-btn" onclick="showPaymentUI()">
                    <i class="fa-solid fa-lock"></i> Proceed to Pay
                </button>
            </div>
        </div>

        <div id="cartPaymentSection" class="cart-payment" style="display:none;">
            <h3><i class="fa-solid fa-credit-card"></i> Payment</h3>
            <div id="payOrderSummary" class="pay-order-summary"></div>
            <div class="pay-total-row">
                <span>Items: <strong id="payItemCount">0</strong></span>
                <span>Total: <strong>₹<span id="payAmount">0</span></strong></span>
            </div>
            <div class="pay-methods">
                <label class="pay-method-option">
                    <input type="radio" name="payMethod" value="upi" checked>
                    <i class="fa-solid fa-mobile-screen"></i> UPI / Google Pay
                </label>
                <label class="pay-method-option">
                    <input type="radio" name="payMethod" value="card">
                    <i class="fa-solid fa-credit-card"></i> Credit / Debit Card
                </label>
                <label class="pay-method-option">
                    <input type="radio" name="payMethod" value="cod">
                    <i class="fa-solid fa-money-bill-wave"></i> Cash on Delivery
                </label>
                <label class="pay-method-option">
                    <input type="radio" name="payMethod" value="netbanking">
                    <i class="fa-solid fa-building-columns"></i> Net Banking
                </label>
            </div>
            <button id="payNowBtn" class="cart-pay-btn" onclick="processPayment()" style="background:var(--btn-green);">
                <i class="fa-solid fa-lock"></i> Pay Now
            </button>
            <button class="cart-cancel-btn" onclick="cancelPayment()">
                <i class="fa-solid fa-arrow-left"></i> Back to Cart
            </button>
        </div>
    </div>
    <div id="cartOverlay" class="cart-overlay" onclick="closeCartPanelFromOverlay()"></div>

    <main class="details-wrapper">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Market</a>
        <div id="productDetailsContainer"></div>
    </main>

    <script src="api.js" defer></script>
    <script src="script.js" defer></script>
</body>
</html>
